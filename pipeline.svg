<svg width="900" height="450" viewBox="0 0 900 450" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="F1 Real-Time Telemetry and Analytics Pipeline Architecture">
  <title>F1 Real-Time Telemetry Pipeline Architecture</title>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="rbBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1019;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rbAccentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3679E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E10600;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

    /* --- Core Layout & Typography --- */
    .bg-rect { fill: url(#rbBlueGrad); }
    text { font-family: 'Rajdhani', sans-serif; fill: #E2E8F0; }
    .node-title { font-weight: 700; font-size: 16px; letter-spacing: 1px; }
    .node-desc { font-weight: 500; font-size: 12px; fill: #94A3B8; }
    .node-box { fill: #161F2D; stroke: #334155; stroke-width: 2; rx: 8; transition: all 0.3s ease; }
    .node-group:hover .node-box { stroke: #3679E7; box-shadow: 0 0 15px rgba(54, 121, 231, 0.3); }

    /* --- Animations --- */
    /* High-Speed Data Flow */
    @keyframes dataPulse {
      to { stroke-dashoffset: -200; }
    }
    .data-stream {
      stroke: url(#rbAccentGrad); stroke-width: 3; stroke-dasharray: 10, 10;
      animation: dataPulse 1s linear infinite; filter: url(#glow);
    }

    /* F1 DRS Mechanics Animation */
    /* Rotates the rear flap from angled (high drag) to flat (low drag) */
    @keyframes drsToggle {
      0%, 15% { transform: rotate(-20deg); fill: #E10600; } /* Closed (High Downforce) */
      35%, 85% { transform: rotate(0deg); fill: #3679E7; }   /* Open (Low Drag - Speed trap) */
      100% { transform: rotate(-20deg); fill: #E10600; }
    }

    .car-body { fill: #E2E8F0; }
    /* The pivot point for the wing flap needs to be precise */
    .drs-flap {
      transform-origin: 135px 215px; /* Pivot at the leading edge of the rear wing */
      animation: drsToggle 3s ease-in-out infinite; /* Synced roughly with data cycles */
    }

    /* --- Interactivity (Hover State) --- */
    .optimal-strategy-label { opacity: 0; transition: opacity 0.3s ease; font-weight: 700; fill: #FFD700; }
    
    /* When hovering the car group: */
    .car-group:hover .drs-flap {
      animation-play-state: paused; /* Lock the wing open */
      transform: rotate(0deg) !important; /* Force open position */
      fill: #FFD700 !important; /* Turn Gold */
      filter: drop-shadow(0 0 5px #FFD700);
    }
    .car-group:hover .optimal-strategy-label { opacity: 1; }
    .car-group:hover .car-body { fill: #FFD700; transition: fill 0.3s ease;}
  </style>

  <rect width="900" height="450" rx="12" class="bg-rect"/>
  <rect width="900" height="450" rx="12" fill="url(#grid)" opacity="0.3"/>

  <path d="M 180 250 L 240 250" class="data-stream"/>
  <path d="M 380 250 L 440 250" class="data-stream"/>
  <path d="M 580 250 L 640 250" class="data-stream"/>

  <g class="car-group" transform="translate(30, 0)" style="cursor: pointer;">
    <text x="105" y="190" text-anchor="middle" class="optimal-strategy-label">OPTIMAL STRATEGY FOUND</text>
    
    <g transform="scale(0.8) translate(0, 100)">
      <path class="car-body" d="M 50 240 C 50 240 70 230 110 230 L 160 230 C 180 230 190 220 195 210 L 200 210 L 200 250 L 180 250 L 175 245 L 80 245 C 70 255 60 260 50 255 Z" />
      <circle cx="65" cy="250" r="15" fill="#0B1019" stroke="#334155" stroke-width="2"/>
      <circle cx="185" cy="250" r="15" fill="#0B1019" stroke="#334155" stroke-width="2"/>
      
      <path d="M 185 230 L 185 215 L 205 215 L 205 230 Z" fill="#1E293B" />
      
      <rect class="drs-flap" x="185" y="215" width="25" height="6" rx="2" fill="#E10600"/>
    </g>
  </g>

  <g class="node-group" transform="translate(240, 210)">
    <rect class="node-box" width="140" height="80"/>
    <text x="70" y="35" text-anchor="middle" class="node-title">FASTF1 API</text>
    <text x="70" y="55" text-anchor="middle" class="node-desc">Telemetry Source (Hz)</text>
  </g>

  <g class="node-group" transform="translate(440, 210)">
    <rect class="node-box" width="140" height="80"/>
    <text x="70" y="35" text-anchor="middle" class="node-title">AZURE FUNCTIONS</text>
    <text x="70" y="55" text-anchor="middle" class="node-desc">Serverless Ingestion</text>
  </g>

  <g class="node-group" transform="translate(640, 210)">
    <rect class="node-box" width="140" height="80"/>
    <text x="70" y="35" text-anchor="middle" class="node-title">AKS / DATABRICKS</text>
    <text x="70" y="55" text-anchor="middle" class="node-desc">Stream Processing</text>
  </g>

  <path d="M 780 250 L 840 250" class="data-stream"/>

  <g class="node-group" transform="translate(840, 210)">
    <rect class="node-box" width="140" height="80" style="stroke: #E10600;"/>
    <text x="70" y="35" text-anchor="middle" class="node-title">GRAFANA</text>
    <text x="70" y="55" text-anchor="middle" class="node-desc">Real-Time Pit Wall Dash</text>
  </g>

  <text x="450" y="60" text-anchor="middle" font-size="24" font-weight="700" letter-spacing="2px">F1 REAL-TIME TELEMETRY PIPELINE</text>
  <text x="450" y="90" text-anchor="middle" font-size="14" fill="#3679E7" letter-spacing="1px">HIGH-FREQUENCY DATA INGESTION & STRATEGY ANALYSIS</text>

</svg>
